# Publish all packages to npm on version tag push.
#
# Tag format: "v${version}" — all three packages are published at the same
# version derived from the tag. If you change the tag format, update both the
# trigger below and RELEASE_TAG_FORMAT in the verification step.
#
# Publish order (dependency graph):
#   1. tyndale-react        (no workspace deps — leaf)
#   2. tyndale-next          (depends on tyndale-react)
#   3. tyndale               (depends on tyndale-react)
#
# Security:
#   - OIDC publishing (no stored NPM_TOKEN secret)
#   - npm provenance (Sigstore attestation linking package to this workflow)
#   - All actions pinned by commit SHA
#   - Minimal permissions (read contents + OIDC token)
#   - Gated by "npm-publish" environment (configure required reviewers in GitHub)
#
# Prerequisites (one-time):
#   1. npm → package settings → Configure Trusted Publishers for EACH package:
#        tyndale-react, tyndale-next, tyndale
#        Repository:  ogrodev/tyndale
#        Workflow:    publish.yml
#        Environment: npm-publish
#   2. GitHub → repo settings → Environments → create "npm-publish"
#        (optional) add required reviewers for manual approval gate

name: Publish to npm

on:
  push:
    tags:
      - "v*" # Keep in sync with RELEASE_TAG_FORMAT below

# Cancel any in-flight publish for the same tag
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    environment: npm-publish

    permissions:
      contents: read
      id-token: write # Required for npm OIDC + provenance

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build:packages

      - name: Verify tag matches package versions
        env:
          RELEASE_TAG_FORMAT: "v${version}"
        run: |
          TAG_RAW="${GITHUB_REF#refs/tags/}"
          TAG_RAW="$TAG_RAW" RELEASE_TAG_FORMAT="$RELEASE_TAG_FORMAT" node --input-type=module <<'NODE'
          import fs from "node:fs";

          const placeholder = "${version}";
          const tagRaw = process.env.TAG_RAW;
          const tagFormat = process.env.RELEASE_TAG_FORMAT;

          if (!tagRaw || !tagFormat) {
            throw new Error("Missing tag verification inputs");
          }

          const placeholderIndex = tagFormat.indexOf(placeholder);
          if (placeholderIndex === -1 || placeholderIndex !== tagFormat.lastIndexOf(placeholder)) {
            throw new Error(`RELEASE_TAG_FORMAT must contain exactly one ${placeholder} placeholder`);
          }

          const prefix = tagFormat.slice(0, placeholderIndex);
          const suffix = tagFormat.slice(placeholderIndex + placeholder.length);
          if (!tagRaw.startsWith(prefix) || !tagRaw.endsWith(suffix)) {
            console.error(`::error::Tag ${tagRaw} does not match configured release tag format ${tagFormat}`);
            process.exit(1);
          }

          const versionEnd = suffix.length === 0 ? tagRaw.length : tagRaw.length - suffix.length;
          const tagVersion = tagRaw.slice(prefix.length, versionEnd);

          const packages = [
            "packages/tyndale-react/package.json",
            "packages/tyndale-next/package.json",
            "packages/tyndale/package.json",
          ];

          let failed = false;
          for (const pkgPath of packages) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            if (!tagVersion || tagVersion !== pkg.version) {
              console.error(`::error::Tag ${tagRaw} resolves to version ${tagVersion || "<empty>"}, but ${pkg.name} is ${pkg.version}`);
              failed = true;
            }
          }
          if (failed) process.exit(1);
          console.log(`All packages at version ${tagVersion} ✓`);
          NODE

      - name: Resolve workspace dependencies
        run: |
          TAG_RAW="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_RAW#v}"
          node --input-type=module <<NODE
          import fs from "node:fs";

          const version = "$VERSION";
          const packages = [
            "packages/tyndale-next/package.json",
            "packages/tyndale/package.json",
          ];

          for (const pkgPath of packages) {
            const raw = fs.readFileSync(pkgPath, "utf8");
            const patched = raw.replace(/"workspace:\*"/g, JSON.stringify("^" + version));
            if (raw !== patched) {
              fs.writeFileSync(pkgPath, patched);
              console.log("Resolved workspace refs in " + pkgPath);
            }
          }
          NODE

      - name: Publish tyndale-react
        working-directory: packages/tyndale-react
        run: npm publish --provenance --access public

      - name: Publish tyndale-next
        working-directory: packages/tyndale-next
        run: npm publish --provenance --access public

      - name: Publish tyndale
        working-directory: packages/tyndale
        run: npm publish --provenance --access public
